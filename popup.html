<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ТъпТест</title>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <style>
            :root {
                --tt-primary: #394da8;
                --tt-primary-light: #4a61c7;
                --tt-button: #1dc198;
                --tt-button-hover: #20d4a7;
                --tt-bg: #ffffff;
                --tt-border: #dee2e6;
                --tt-shadow: 0 8px 32px rgba(57, 77, 168, 0.18);
                --tt-shadow-sm: 0 2px 8px rgba(57, 77, 168, 0.12);
                --tt-radius: 14px;
                --tt-radius-sm: 8px;
                --tt-transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                width: 300px;
                font-family: Nunito, Helvetica, sans-serif;
                background: var(--tt-bg);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                box-shadow: var(--tt-shadow);
                border: 1px solid rgba(57, 77, 168, 0.1);
            }

            /* ── Header ── */
            #tt-header {
                background: linear-gradient(135deg, var(--tt-primary) 0%, var(--tt-primary-light) 100%);
                color: white;
                padding: 0.85rem 1rem 0.85rem 1.1rem;
                font-size: 15px;
                font-weight: 700;
                display: flex;
                align-items: center;
                letter-spacing: 0.02em;
                user-select: none;
            }

            /* ── Content ── */
            #tt-content {
                display: flex;
                flex-direction: column;
                padding: 14px 14px 10px;
                gap: 0;
            }

            /* ── Section label ── */
            .tt-section-label {
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: #94a0b8;
                margin: 10px 2px 6px;
            }

            .tt-section-label:first-child {
                margin-top: 0;
            }

            /* ── Input ── */
            .tt-input {
                width: 100%;
                border: 1.5px solid var(--tt-border);
                border-radius: var(--tt-radius-sm);
                padding: 7px 11px;
                font-family: Nunito, Helvetica, sans-serif;
                font-size: 13px;
                line-height: 20px;
                outline: none;
                background: #f8f9fc;
                color: #212529;
                transition:
                    border-color var(--tt-transition),
                    box-shadow var(--tt-transition);
                margin-bottom: 8px;
            }

            .tt-input::placeholder {
                color: #b0b9d0;
            }

            .tt-input:focus {
                border-color: var(--tt-button-hover);
                background: white;
                box-shadow: 0 0 0 3px rgba(57, 77, 168, 0.1);
            }

            /* ── Divider ── */
            .divider {
                height: 1px;
                background: rgba(57, 77, 168, 0.08);
                margin: 8px 0 10px;
            }

            /* ── Status box ── */
            #status-box {
                background: #f4f6fb;
                border: 1px solid rgba(57, 77, 168, 0.06);
                border-radius: var(--tt-radius-sm);
                padding: 8px 12px;
                font-size: 12.5px;
                color: #5a6480;
                min-height: 48px;
                display: flex;
                align-items: center;
                margin-bottom: 8px;
                line-height: 1.4;
                box-shadow: var(--tt-shadow-sm);
                flex-direction: column;
            }

            #status-box.success {
                color: #0ea37a;
                font-weight: 600;
            }
            #status-box.error {
                color: #e03e3e;
                font-weight: 600;
            }

            /* ── Buttons ── */
            .tt-button {
                background: var(--tt-button);
                color: white;
                border: none;
                border-radius: var(--tt-radius-sm);
                padding: 7px 14px;
                font-size: 16px;
                font-family: Nunito, Helvetica, sans-serif;
                font-weight: 600;
                cursor: pointer;
                white-space: pre-line;
                text-align: center;
                width: 100%;
                margin-bottom: 8px;
                transition:
                    background var(--tt-transition),
                    transform var(--tt-transition),
                    box-shadow var(--tt-transition);
                box-shadow: 0 2px 6px rgba(57, 77, 168, 0.2);
            }

            .tt-button:hover {
                background: var(--tt-button-hover);
                box-shadow: 0 4px 12px rgba(32, 212, 167, 0.3);
                transform: translateY(-1px);
            }

            .tt-button:active {
                transform: translateY(0);
                box-shadow: none;
            }
        </style>
    </head>
    <body>
        <div id="tt-header">ТъпТест</div>

        <div id="tt-content">
            <div class="tt-section-label">Профил</div>

            <input class="tt-input" type="text" id="input-username" placeholder="Потребителско име" />
            <input class="tt-input" type="password" id="input-password" placeholder="Парола" />

            <div class="divider"></div>

            <div class="tt-section-label">Статус</div>
            <div id="status-box">Ready.</div>

            <div class="tt-section-label">Опции</div>
            <button class="tt-button" id="btn-check-subscription">Провери абонамент</button>
            <button class="tt-button" id="btn-check-connection">Провери връзка</button>
            <!-- <button class="tt-button" id="btn-check-payment">Check payment</button> -->
        </div>

        <script src="popup.js"></script>
    </body>
</html>
